name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build
  CCACHE_DIR: ~/.ccache

jobs:

  ################################
  # Matrix: Ubuntu + macOS
  ################################
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: macos-latest
            compiler: clang

    steps:
      - uses: actions/checkout@v4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ matrix.compiler }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.compiler }}-

      - name: Install deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ccache pandoc poppler-utils

      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake pandoc poppler ccache || true

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Configure
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cmake -S . -B $BUILD_DIR \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          else
            cmake -S . -B $BUILD_DIR \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          fi

      - name: Build
        run: cmake --build $BUILD_DIR -- -j

      - name: Test
        run: $BUILD_DIR/bookr --version

      - name: Verify macOS universal
        if: matrix.os == 'macos-latest'
        run: |
          file $BUILD_DIR/bookr
          lipo -info $BUILD_DIR/bookr || true


  ################################
  # Sanitizers (Ubuntu Debug)
  ################################
  sanitizers:
    name: Sanitizers (clang, Debug)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang ccache

      - name: Configure (Debug + ASan/UBSan)
        run: |
          cmake -S . -B $BUILD_DIR \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBOOKR_ENABLE_SANITIZERS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build $BUILD_DIR -- -j

      - name: Test
        run: $BUILD_DIR/bookr --version


  ################################
  # Debian
  ################################
  debian:
    runs-on: ubuntu-latest
    container: debian:stable-slim

    steps:
      - uses: actions/checkout@v4
      - run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            cmake build-essential ccache pandoc poppler-utils pkg-config
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build -j
      - run: build/bookr --version


  ################################
  # Fedora
  ################################
  fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4
      - run: |
          dnf -y install cmake gcc-c++ make ccache pandoc poppler-utils
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build -j
      - run: build/bookr --version


  ################################
  # Arch
  ################################
  arch:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - uses: actions/checkout@v4
      - run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm
          pacman -S --noconfirm cmake gcc make ccache pandoc poppler
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build -j
      - run: build/bookr --version


  ################################
  # Nix
  ################################
  nix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v25

      - run: |
          nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
          nix-channel --update

      - run: |
          nix-shell -p cmake gcc pandoc poppler --run "
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release &&
            cmake --build build -j &&
            build/bookr --version
          "
